# =============================================================================
# Spring Boot アプリケーション設定
# =============================================================================
#
# 【学習ポイント】
# application.yml は Spring Boot の設定ファイル。
# Spring Boot = Spring Framework + 自動設定 + 組み込みサーバー。
# このファイルで自動設定をカスタマイズできる。
#
# 【Reviewer観点】
# - 機密情報（パスワード等）は環境変数で渡すべき
# - 開発/本番で設定を分ける（profiles 機能）
# =============================================================================

spring:
  application:
    name: api

  # ---------------------------------------------------------------------------
  # データベース設定
  # ---------------------------------------------------------------------------
  datasource:
    # 環境変数から取得。未設定なら localhost を使用
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/webapp}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # ---------------------------------------------------------------------------
  # JPA / Hibernate 設定
  # ---------------------------------------------------------------------------
  # JPA = ORM の仕様、Hibernate = その実装
  # オブジェクトとDBテーブルを自動マッピングする
  jpa:
    hibernate:
      # validate: SQLで手動作成したスキーマを検証のみ
      # 本番では none、開発では update も選択肢だが意図しない変更リスクあり
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ---------------------------------------------------------------------------
# サーバー設定
# ---------------------------------------------------------------------------
server:
  port: 8080

# ---------------------------------------------------------------------------
# ログ設定
# ---------------------------------------------------------------------------
logging:
  level:
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
