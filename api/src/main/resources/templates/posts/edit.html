<!DOCTYPE html>
<!--
  投稿編集フォーム（Thymeleaf 版）

  【学習ポイント】
  新規作成フォームとほぼ同じだが、以下が異なる：
  - 送信先: POST /thymeleaf/posts/{id}（既存リソースの更新）
  - フォームに既存データがプリセットされる

  【HTML form の制約】
  HTML の form は GET/POST しか送れない。PUT/DELETE は使えない。
  そのため MPA では POST を使い、パスで操作を区別する。
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投稿編集 (Thymeleaf)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .info-box { padding: 12px; margin-bottom: 20px; border-radius: 4px; font-size: 14px; }
        .info-box.orange { background: #fff3e0; border: 1px solid #ff9800; color: #e65100; }
        h1 { color: #333; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input[type="text"], textarea {
            width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;
            font-size: 14px; box-sizing: border-box;
        }
        textarea { min-height: 150px; resize: vertical; }
        .actions { display: flex; gap: 8px; margin-top: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-primary { background: #2196f3; color: white; }
        .btn-secondary { background: #757575; color: white; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h1>投稿編集（Thymeleaf / MPA）</h1>

    <div class="info-box orange">
        <p><strong>値渡し方式: パスパラメータ + form POST body</strong></p>
        <p>送信先: POST /thymeleaf/posts/<span th:text="${post.id}">1</span></p>
        <p>データ: application/x-www-form-urlencoded</p>
        <p>送信後: PRG パターンで詳細ページにリダイレクト</p>
    </div>

    <!--
      【学習ポイント】
      更新の場合、送信先にパスパラメータで ID を含める。
      th:action="@{/thymeleaf/posts/{id}(id=${post.id})}"
      → /thymeleaf/posts/1 のような URL に展開される
    -->
    <form th:action="@{/thymeleaf/posts/{id}(id=${post.id})}" th:object="${post}" method="post">
        <div class="form-group">
            <label for="title">タイトル</label>
            <input type="text" th:field="*{title}" required>
        </div>

        <div class="form-group">
            <label for="content">内容</label>
            <textarea th:field="*{content}" required></textarea>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary">更新する</button>
            <a th:href="@{/thymeleaf/posts/{id}(id=${post.id})}" class="btn btn-secondary">キャンセル</a>
        </div>
    </form>
</body>
</html>
