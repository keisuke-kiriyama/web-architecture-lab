<!DOCTYPE html>
<!--
  投稿作成フォーム（Thymeleaf 版）

  【学習ポイント: form POST】
  - method="post" で POST リクエストを送信
  - th:action で送信先 URL を指定
  - th:object でフォームとオブジェクトをバインド
  - th:field で各入力フィールドとプロパティをバインド

  【CSRF トークン】
  Thymeleaf + Spring Security では、
  th:action を使うと CSRF トークンが自動で hidden フィールドに埋め込まれる。
  View Source で確認すると <input type="hidden" name="_csrf" value="..."> が見える。
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規投稿 (Thymeleaf)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .info-box { padding: 12px; margin-bottom: 20px; border-radius: 4px; font-size: 14px; }
        .info-box.orange { background: #fff3e0; border: 1px solid #ff9800; color: #e65100; }
        h1 { color: #333; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input[type="text"], textarea {
            width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;
            font-size: 14px; box-sizing: border-box;
        }
        textarea { min-height: 150px; resize: vertical; }
        .actions { display: flex; gap: 8px; margin-top: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-primary { background: #2196f3; color: white; }
        .btn-secondary { background: #757575; color: white; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h1>新規投稿（Thymeleaf / MPA）</h1>

    <div class="info-box orange">
        <p><strong>値渡し方式: form POST body</strong></p>
        <p>送信先: POST /thymeleaf/posts</p>
        <p>データ: application/x-www-form-urlencoded（title=xxx&content=yyy）</p>
        <p>送信後: PRG パターンで一覧ページにリダイレクト</p>
    </div>

    <!--
      【学習ポイント】
      th:action="@{/thymeleaf/posts}" で送信先を指定
      th:object="${post}" でフォームにバインドするオブジェクトを指定
      th:field="*{title}" で post.title とバインド（name, id, value を自動設定）
    -->
    <form th:action="@{/thymeleaf/posts}" th:object="${post}" method="post">
        <div class="form-group">
            <label for="title">タイトル</label>
            <input type="text" th:field="*{title}" required placeholder="投稿のタイトルを入力">
        </div>

        <div class="form-group">
            <label for="content">内容</label>
            <textarea th:field="*{content}" required placeholder="投稿の内容を入力"></textarea>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary">投稿する</button>
            <a th:href="@{/thymeleaf/posts}" class="btn btn-secondary">キャンセル</a>
        </div>
    </form>
</body>
</html>
