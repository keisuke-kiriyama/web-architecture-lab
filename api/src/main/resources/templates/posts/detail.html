<!DOCTYPE html>
<!--
  投稿詳細ページ（Thymeleaf 版）

  【学習ポイント】
  パスパラメータ（/posts/{id}）でリソースを識別。
  SPA 版と同じ URL 設計だが、サーバーで HTML を生成する点が異なる。
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title} + ' | 投稿詳細'">投稿詳細 (Thymeleaf)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .info-box { padding: 12px; margin-bottom: 20px; border-radius: 4px; font-size: 14px; }
        .info-box.orange { background: #fff3e0; border: 1px solid #ff9800; color: #e65100; }
        h1 { color: #333; }
        .post { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .post h2 { margin: 0 0 12px 0; }
        .post p { color: #666; white-space: pre-wrap; }
        .meta { color: #999; font-size: 12px; margin-top: 16px; }
        .actions { display: flex; gap: 8px; margin-top: 20px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn-primary { background: #2196f3; color: white; }
        .btn-secondary { background: #757575; color: white; }
        .btn-danger { background: #f44336; color: white; }
        form { display: inline; }
    </style>
</head>
<body>
    <h1>投稿詳細（Thymeleaf / MPA）</h1>

    <div class="info-box orange">
        <p><strong>値渡し方式: パスパラメータ</strong></p>
        <p>URL: /thymeleaf/posts/<span th:text="${post.id}">1</span></p>
        <p>取得方法: @PathVariable Long id</p>
    </div>

    <article class="post">
        <h2 th:text="${post.title}">タイトル</h2>
        <p th:text="${post.content}">コンテンツ</p>
        <div class="meta">
            <p>作成日時: <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 12:00:00</span></p>
            <p>更新日時: <span th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 12:00:00</span></p>
        </div>
    </article>

    <div class="actions">
        <a th:href="@{/thymeleaf/posts}" class="btn btn-secondary">← 一覧に戻る</a>
        <a th:href="@{/thymeleaf/posts/{id}/edit(id=${post.id})}" class="btn btn-primary">編集</a>
        <form th:action="@{/thymeleaf/posts/{id}/delete(id=${post.id})}" method="post">
            <button type="submit" class="btn btn-danger"
                    onclick="return confirm('削除しますか？')">
                削除
            </button>
        </form>
    </div>
</body>
</html>
